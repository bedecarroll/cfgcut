version: 2

updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    groups:
      rust-deps:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: "/crates/pycfgcut"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    groups:
      python-deps:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    groups:
      github-actions:
        patterns:
          - "*"
